                                                    <div className="flex justify-center items-center group/menu inline-block">
                                                        <button className="text-gray-400 hover:text-blue-600 transition-colors p-1 text-sm" title="메뉴">
                                                            ⚙️
                                                        </button>
                                                        <div className="absolute right-full mr-1 top-1/2 -translate-y-1/2 opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all duration-200 flex bg-white border border-gray-200 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] rounded-lg p-1.5 gap-1 z-[999] whitespace-nowrap">
                                                            <button onClick={()=>insertArrayItem(idx, 'winHealthChecks', {category:'', tools:'', threshold:'', result:'양호', detail:''})} className="text-xs hover:bg-blue-50 hover:text-blue-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">➕ 추가</button>
                                                            <button onClick={()=>duplicateArrayItem(idx, 'winHealthChecks')} className="text-xs hover:bg-emerald-50 hover:text-emerald-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">📑 복사</button>
                                                            <div className="w-px bg-gray-200 mx-0.5 my-1"></div>
                                                            <button onClick={()=>removeArrayItem(idx, 'winHealthChecks')} className="text-xs hover:bg-red-50 hover:text-red-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">❌ 삭제</button>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <button onClick={()=>addArrayItem('winHealthChecks', {category:'', tools:'', threshold:'', result:'양호', detail:''})} className="no-print mt-3 text-xs font-bold text-blue-600 px-3 py-1 bg-blue-50 rounded hover:bg-blue-100">+ Windows 항목 추가</button>
                            </div>
                        )}

                        {data.toggles.linuxHealth && (
                            <div className="mb-10 avoid-break">
                                <div className="text-sm font-bold text-emerald-700 mb-2 pl-1 border-l-4 border-emerald-400">Linux 점검 항목</div>
                                <table className="w-full text-sm text-center custom-table table-fixed border-emerald-200">
                                    <thead>
                                        <tr className="bg-emerald-50/50">
                                            <th className="w-[18%] border-emerald-100">점검 항목</th>
                                            <th className="w-[35%] border-emerald-100">점검 도구 및 명령어</th>
                                            <th className="w-[22%] border-emerald-100">판단 기준 (임계치)</th>
                                            <th className="w-[19%] border-emerald-100">점검 결과 및 상세</th>
                                            <th className="no-print w-[6%] border-emerald-100"></th>
                                        </tr>
                                    </thead>
                                    <tbody>

                        {(data.toggles.winStorage || data.toggles.linuxStorage || (data.extraWinTables && data.extraWinTables.length > 0) || (data.extraLinuxTables && data.extraLinuxTables.length > 0)) && (
                            <div className="text-right text-xs text-gray-400 no-print mb-10">
                                * 불러오기 시 지난달 '당월 Free'가 '전월 Free'로 이월됩니다.
                            </div>
                        )}

                        <LayoutControl sectionKey="sec3" />

                        {(activeGroups || []).length > 0 && (
                            <div className="avoid-break mt-4 mb-12">
                                {(activeGroups || []).map((group, idx) => (
                                    <div key={group} className="mb-8">
                                        <div className="sub-title flex items-center">
                                            <span className="mr-2 shrink-0 whitespace-nowrap">3-{idx + 1}.</span>
                                            <input
                                                type="text"
                                                value={data.storageTitles[group] || ''}
                                                onChange={(e) => handleChange(e, 'storageTitles', group)}
                                                className="bg-transparent outline-none w-full hover:bg-gray-50 px-1 rounded transition text-[#334155]"
                                                placeholder="분석 제목을 입력하세요"
                                            />
                                        </div>
                                        {renderAnalysisCard(group)}
                                    </div>
                                ))}
                            </div>
                        )}

                        <LayoutControl sectionKey="sec4" />

                        <div className="avoid-break mt-12">
                            <h3 className="section-title">4. 종합 결과 및 안내</h3>
                            <div className="flex flex-col gap-4 border border-blue-100 rounded-2xl p-6 bg-white shadow-sm relative">

                                <div>
                                    <h4 className="font-extrabold text-[#1e3a8a] mb-2 flex items-center text-lg">
                                        <span className="bg-blue-100 text-blue-800 w-6 h-6 rounded-full inline-flex items-center justify-center text-xs mr-2">!</span> 
                                        종합 소견
                                    </h4>
                                    <PrintableTextarea 
                                        value={data.serviceHistory || ''} 
                                        onChange={(e) => handleChange(e, null, 'serviceHistory')} 
                                        minHeight="80px" 
                                        printMinHeight="80px"
                                        className="text-sm leading-relaxed bg-gray-50/50 border border-gray-100 rounded-xl p-3 w-full text-gray-800" 
                                        placeholder="종합 소견 내용을 직접 입력하세요." 
                                    />
                                </div>
                                
                                <div className="grid grid-cols-2 gap-6 mt-2">
                                    <div>
                                        <label className="text-xs font-black text-gray-500 mb-1.5 block uppercase">노후 장비 공지</label>
                                        <PrintableTextarea value={(data.notices && data.notices.agingEquip) || ''} onChange={(e)=>handleChange(e, 'notices', 'agingEquip')} className="bg-gray-50/50 border border-gray-100 rounded-xl p-3 text-sm shadow-sm w-full text-gray-700" minHeight="50px" placeholder="노후 장비 관련 메모" />
                                    </div>
                                    <div>
                                        <label className="text-xs font-black text-gray-500 mb-1.5 block uppercase">환경 개선 권고</label>
                                        <PrintableTextarea value={(data.notices && data.notices.infraImprovement) || ''} onChange={(e)=>handleChange(e, 'notices', 'infraImprovement')} className="bg-gray-50/50 border border-gray-100 rounded-xl p-3 text-sm shadow-sm w-full text-gray-700" minHeight="50px" placeholder="환경 개선 권고 사항" />
                                    </div>
                                </div>
                                
                                <div className="mt-2 pt-3 border-t border-gray-100 flex flex-row items-center justify-between gap-2 bg-gray-50 rounded-lg p-3">
                                    <label className="flex items-center text-[11px] md:text-xs text-gray-600 cursor-pointer whitespace-nowrap"><input type="checkbox" className="mr-2 no-print" checked={data.notices && data.notices.zabbixRequired} onChange={(e)=>handleChange(e, 'notices', 'zabbixRequired')} /><span className={data.notices && data.notices.zabbixRequired ? 'font-bold text-blue-700' : ''}>[{data.notices && data.notices.zabbixRequired ? '✓' : ' '}] Zabbix 모니터링 권고</span></label>
                                    <label className="flex items-center text-[11px] md:text-xs text-gray-600 cursor-pointer whitespace-nowrap"><input type="checkbox" className="mr-2 no-print" checked={data.notices && data.notices.iloRequired} onChange={(e)=>handleChange(e, 'notices', 'iloRequired')} /><span className={data.notices && data.notices.iloRequired ? 'font-bold text-blue-700' : ''}>[{data.notices && data.notices.iloRequired ? '✓' : ' '}] iLO 원격 관리 설정</span></label>
                                    <label className="flex items-center text-[11px] md:text-xs text-gray-600 cursor-pointer whitespace-nowrap"><input type="checkbox" className="mr-2 no-print" checked={data.notices && data.notices.backupRequired} onChange={(e)=>handleChange(e, 'notices', 'backupRequired')} /><span className={data.notices && data.notices.backupRequired ? 'font-bold text-blue-700' : ''}>[{data.notices && data.notices.backupRequired ? '✓' : ' '}] 백업 확인 필요</span></label>
                                </div>
                            </div>
                        </div>

                        <LayoutControl sectionKey="sec5" />

                        <div className={`avoid-break mt-12 mb-8 ${(!data.supportHistory || data.supportHistory.length === 0) ? 'print:hidden' : ''}`}>
                            <h3 className="section-title">5. 장애 및 지원 이력</h3>
                            
                            {(!data.supportHistory || data.supportHistory.length === 0) ? (
                                <div className="border border-dashed border-gray-300 rounded-xl p-6 text-center text-gray-400 bg-gray-50 no-print">
                                    등록된 장애 및 지원 이력이 없습니다.<br/>
                                    <button onClick={() => addArrayItem('supportHistory', {date: data.checkDate.substring(2).replace(/-/g, '.'), content: ''})} className="mt-3 text-xs font-bold text-blue-600 px-3 py-1.5 bg-white border border-blue-200 rounded hover:bg-blue-50 shadow-sm">+ 이력 추가</button>
                                </div>
                            ) : (
                                <div>
                                    <table className="w-full text-sm text-center custom-table table-fixed">
                                        <thead>
                                            <tr>
                                                <th className="w-[15%]">일자</th>
                                                <th className="w-[79%]">지원 내용</th>
                                                <th className="no-print w-[6%]"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {(data.supportHistory || []).map((history, idx) => (
                                                <tr key={history.id}>
                                                    <td className="align-middle">
                                                        <input type="text" value={history.date} onChange={(e) => handleArrayChange(idx, 'supportHistory', 'date', e.target.value)} placeholder="예: 26.03.05" className="w-full text-center font-bold text-gray-700 bg-transparent border-none outline-none" />
                                                    </td>
                                                    <td className="align-middle text-left">
                                                        <PrintableTextarea value={history.content} onChange={(e) => handleArrayChange(idx, 'supportHistory', 'content', e.target.value)} placeholder="지원 내용을 입력하세요. (장애 처리, 원격 점검, 부품 교체 등)" className="w-full text-left bg-transparent border-none px-2" minHeight="30px" />
                                                    </td>
                                                    <td className="no-print align-middle relative hover:z-[100]">
                                                        <div className="flex justify-center items-center group/menu inline-block">
                                                            <button className="text-gray-400 hover:text-blue-600 transition-colors p-1 text-sm" title="메뉴">
                                                                ⚙️
                                                            </button>
                                                            <div className="absolute right-full mr-1 top-1/2 -translate-y-1/2 opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all duration-200 flex bg-white border border-gray-200 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] rounded-lg p-1.5 gap-1 z-[999] whitespace-nowrap">
                                                                <button onClick={()=>insertArrayItem(idx, 'supportHistory', {date: data.checkDate.substring(2).replace(/-/g, '.'), content: ''})} className="text-xs hover:bg-blue-50 hover:text-blue-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">➕ 추가</button>
                                                                <button onClick={()=>duplicateArrayItem(idx, 'supportHistory')} className="text-xs hover:bg-emerald-50 hover:text-emerald-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">📑 복사</button>
                                                                <div className="w-px bg-gray-200 mx-0.5 my-1"></div>
                                                                <button onClick={() => removeArrayItem(idx, 'supportHistory')} className="text-xs hover:bg-red-50 hover:text-red-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">❌ 삭제</button>
                                                            </div>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div className="mt-3 no-print">
                                        <button onClick={() => addArrayItem('supportHistory', {date: data.checkDate.substring(2).replace(/-/g, '.'), content: ''})} className="text-xs font-bold text-blue-600 px-3 py-1.5 bg-blue-50 rounded hover:bg-blue-100">+ 이력 추가</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* 자유 텍스트 섹션 */}
                        {(data.freeTextBlocks || []).map((block, idx) => (
                            <React.Fragment key={block.id}>
                                <LayoutControl sectionKey={`freeText_${block.id}`} />
                                <div className="avoid-break mt-12 mb-8 relative group">
                                    <div className="flex justify-between items-center mb-4">
                                        <div className="flex-1 flex items-center">
                                            <div className="w-1 h-6 bg-[#2563eb] mr-2 rounded-full no-print"></div>
                                            <input 
                                                type="text" 
                                                value={block.title} 
                                                onChange={(e) => handleArrayChange(idx, 'freeTextBlocks', 'title', e.target.value)} 
                                                placeholder="섹션 제목을 입력하세요 (예: 특이사항 상세 보고)" 
                                                className="text-[#1e3a8a] font-extrabold text-xl bg-transparent outline-none w-full placeholder-[#1e3a8a]/40"
                                            />
                                        </div>
                                        <button onClick={() => removeArrayItem(idx, 'freeTextBlocks')} className="no-print text-red-400 hover:text-red-600 font-bold ml-4 text-sm bg-red-50 px-3 py-1 rounded">섹션 삭제 ✕</button>
                                    </div>
                                    <div className="border border-gray-200 rounded-xl p-6 bg-white shadow-sm hover:border-blue-200 transition">
                                        <PrintableTextarea 
                                            value={block.content} 
                                            onChange={(e) => handleArrayChange(idx, 'freeTextBlocks', 'content', e.target.value)} 
                                            placeholder="자유롭게 내용을 작성하세요..." 
                                            minHeight="100px"
                                            className="text-sm leading-relaxed text-gray-700 w-full"
                                        />
                                    </div>
                                </div>
                            </React.Fragment>
                        ))}

                        <div className="mt-8 mb-4 no-print flex flex-wrap justify-center gap-3">
                            <button 
                                onClick={() => addArrayItem('freeTextBlocks', { title: '', content: '' })} 
                                className="bg-white border-2 border-dashed border-blue-300 text-blue-600 hover:bg-blue-50 px-5 py-2.5 rounded-xl font-bold transition shadow-sm"
                            >
                                + 텍스트 섹션 추가
                            </button>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
