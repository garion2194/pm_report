<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 PM 레포트</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
        }
        
        .a4-min-height { min-height: 297mm; }

        /* --- 인쇄 전용 스타일 --- */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            @page {
                size: A4 portrait;
                margin: 15mm 10mm; 
            }
            body { background-color: white; }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; break-before: page; }
            
            .shadow-lg, .shadow-sm, .rounded-2xl, .rounded-xl { box-shadow: none !important; }
            .border { border-color: #e2e8f0 !important; }
            
            input, select { 
                border: none !important; 
                background: transparent !important;
                padding: 0 !important;
            }

            /* 미러링 텍스트 */
            .textarea-edit-mode { display: none !important; }
            
            .text-print-mode { 
                display: block !important; 
                white-space: pre-wrap !important; 
                word-break: keep-all !important; 
                overflow-wrap: break-word !important; 
                line-height: 1.5 !important;
                padding-top: 4px;
                padding-bottom: 4px;
            }

            .print-row-force {
                display: flex !important;
                flex-direction: row !important;
                align-items: center !important;
                justify-content: flex-end !important;
                white-space: nowrap !important;
            }

            .a4-min-height { min-height: auto !important; }

            .cover-page { 
                height: 230mm !important; 
                max-height: 230mm !important;
                box-sizing: border-box !important;
                overflow: hidden !important; 
                page-break-after: always !important;
                page-break-inside: avoid !important;
            }

            .avoid-break { page-break-inside: avoid !important; }
            .container { max-width: 100% !important; margin: 0 !important; padding: 0 !important; }

            .custom-table th, .custom-table td {
                padding: 3px 2px !important;
                font-size: 11px !important;
            }
            
            .text-print-mode {
                line-height: 1.3 !important;
                padding-top: 1px !important;
                padding-bottom: 1px !important;
                font-size: 11px !important;
            }
            
            .mb-10 { margin-bottom: 1.5rem !important; }
            .mt-10 { margin-top: 1.5rem !important; }
            .section-title { margin-bottom: 0.5rem !important; font-size: 1.15rem !important; }
        }

        /* 숫자 입력칸 화살표 숨기기 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        input, textarea { 
            outline: none; 
            transition: border-color 0.2s; 
        }
        
        textarea {
            resize: none !important; 
            overflow: hidden; 
            line-height: 1.5;
            padding-top: 4px;
            padding-bottom: 4px;
        }
        input:focus, textarea:focus { border-color: #2563eb; }
        
        .text-print-mode { display: none; }
        
        .section-title {
            color: #1e3a8a; 
            font-weight: 800;
            font-size: 1.25rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background-color: #2563eb; 
            margin-right: 8px;
            border-radius: 2px;
        }
        
        .sub-title {
            color: #334155;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .custom-table th {
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 600;
            border: 1px solid #e2e8f0; 
            padding: 8px;
        }
        .custom-table td {
            border: 1px solid #e2e8f0;
            padding: 6px;
            vertical-align: middle;
        }
        
        .donut-circle {
            transition: stroke-dasharray 1s ease-out;
        }
    </style>
</head>
<body class="text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        // ★★★ 구글 Apps Script 웹 앱 URL이 입력된 부분입니다 ★★★
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTIAW9EkSKeabzKi5Dd-ayi_W8_sxTAJmtw21Wz28YZj_d3MrB9zLHOgoiN-vU4MRLjg/exec";

        const { useState, useEffect, useRef } = React;

        const PrintableTextarea = ({ value, onChange, placeholder, className, minHeight = "auto", printMinHeight = "auto", rows = 1 }) => {
            const textareaRef = useRef(null);
            
            useEffect(() => {
                if (textareaRef.current) {
                    textareaRef.current.style.height = "auto";
                    textareaRef.current.style.height = textareaRef.current.scrollHeight + "px";
                }
            }, [value]);

            return (
                <div className="w-full relative flex flex-col justify-center h-full">
                    <textarea
                        ref={textareaRef}
                        value={value}
                        onChange={onChange}
                        placeholder={placeholder}
                        className={`textarea-edit-mode w-full bg-transparent outline-none focus:ring-0 transition-colors ${className}`}
                        style={{ minHeight }}
                        rows={rows}
                    />
                    <div className={`text-print-mode ${className}`} style={{ minHeight: printMinHeight }}>
                        {value || ""}
                    </div>
                </div>
            );
        };

        const SignaturePad = ({ isOpen, onClose, onSave, targetTitle }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);

            useEffect(() => {
                if (isOpen && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width;
                    canvas.height = rect.height;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';
                    ctx.strokeStyle = '#0f172a'; 
                    
                    setHasDrawn(false);
                }
            }, [isOpen]);

            const getCoordinates = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                if (e.touches && e.touches.length > 0) {
                    return {
                        x: e.touches[0].clientX - rect.left,
                        y: e.touches[0].clientY - rect.top
                    };
                }
                return {
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                };
            };

            const startDrawing = (e) => {
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(x, y);
                setIsDrawing(true);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                const { x, y } = getCoordinates(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(x, y);
                ctx.stroke();
                setHasDrawn(true);
            };

            const stopDrawing = () => {
                if (isDrawing) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.closePath();
                    setIsDrawing(false);
                }
            };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const handleSave = () => {
                if (!hasDrawn) {
                    onSave(''); 
                } else {
                    onSave(canvasRef.current.toDataURL('image/png'));
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-gray-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm no-print">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col border border-gray-200">
                        <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                            <h3 className="font-bold text-lg text-gray-800 flex items-center gap-2">
                                <span className="text-blue-600">✍️</span> {targetTitle} 서명 입력
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-700 p-1 rounded-full hover:bg-gray-200 transition">
                                <span className="text-lg">✕</span>
                            </button>
                        </div>
                        <div className="p-5 bg-gray-50 flex flex-col gap-2">
                            <div className="text-xs text-gray-500 font-medium text-center">아래 영역에 마우스나 터치로 서명해주세요.</div>
                            <canvas
                                ref={canvasRef}
                                className="w-full h-40 bg-white border-2 border-dashed border-gray-300 rounded-xl cursor-crosshair touch-none shadow-inner"
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                        </div>
                        <div className="p-4 bg-white flex justify-between items-center gap-3">
                            <button onClick={clearCanvas} className="px-4 py-2 bg-gray-100 text-gray-600 font-bold rounded-lg hover:bg-gray-200 transition text-sm">지우기</button>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 bg-white border border-gray-300 text-gray-700 font-bold rounded-lg hover:bg-gray-50 transition text-sm">취소</button>
                                <button onClick={handleSave} className="px-6 py-2 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 shadow-sm transition text-sm shadow-blue-600/20">서명 적용</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const defaultWinHealthChecks = [
            { id: 1, category: 'H/W LED Check', tools: 'PowerSupply, FAN, HDD, PCI, Memory Controller, Health', threshold: '정상=Green, 비정상=Amber', result: '양호', detail: '' },
            { id: 2, category: 'System Error Log Check', tools: 'Event Viewer - System, Application', threshold: '에러 로그 없음', result: '양호', detail: '' },
            { id: 3, category: 'Hardware Log', tools: 'IML, iDrac, ACU, SSA, OpenManager', threshold: '에러 로그 없음', result: '양호', detail: '' },
            { id: 4, category: 'TCP/IP Status Check', tools: 'ping (Gateway IP)', threshold: 'time=1ms이하 권장', result: '양호', detail: '' },
            { id: 5, category: 'CPU Status Check', tools: '작업관리자', threshold: '80%이하 사용 권장', result: '양호', detail: '' },
            { id: 6, category: 'Memory Status Check', tools: '작업관리자', threshold: '80%이하 사용 권장', result: '양호', detail: '' }
        ];

        const defaultLinuxHealthChecks = [
            { id: 11, category: 'H/W LED Check', tools: 'PowerSupply, FAN, HDD, PCI, Memory Controller, Health', threshold: '정상=Green, 비정상=Amber', result: '양호', detail: '' },
            { id: 12, category: 'System Error Log Check', tools: 'dmesg | grep error (or fail)\ncat /var/log/messages | more\ncat /var/log/boot.log', threshold: '에러 없음', result: '양호', detail: '' },
            { id: 13, category: 'User Process Status Check', tools: 'ps -ef | more', threshold: '이상 없음', result: '양호', detail: '' },
            { id: 14, category: 'Network Interface Status Check', tools: 'ifconfig -a | more\nethtool 인터페이스명\nip -a or ip -s link', threshold: 'collision=10이하 권장', result: '양호', detail: '' },
            { id: 15, category: 'TCP/IP Status Check', tools: 'ping (Gateway IP)', threshold: 'time=1ms 이하 권장', result: '양호', detail: '' },
            { id: 16, category: 'FileSystem Usage Check', tools: 'df -h', threshold: 'use=90% 이하 권장', result: '양호', detail: '' },
            { id: 17, category: 'CPU Status Check', tools: 'top', threshold: 'idle=20% 이상 권장', result: '양호', detail: '' },
            { id: 18, category: 'Memory Status Check', tools: 'free (or top)', threshold: 'free=10% 이상 권장', result: '양호', detail: '' },
            { id: 19, category: 'swap Status Check', tools: 'free', threshold: 'used=512000K 이하 권장', result: '양호', detail: '' },
            { id: 20, category: 'System Uptime', tools: 'uptime -p or uptime -s', threshold: '재부팅 여부 확인', result: '양호', detail: '45 Days' },
            { id: 21, category: 'Disk I/O Wait', tools: 'iostat or top (wa 지표)', threshold: '10% 미만 권장 (디스크 병목)', result: '양호', detail: '' },
            { id: 22, category: 'Load Average Check', tools: 'uptime or top', threshold: 'CPU 코어 수 미만 유지', result: '양호', detail: '' },
            { id: 23, category: 'Inode Usage Check', tools: 'df -i', threshold: 'use=80% 이하 권장', result: '양호', detail: '' },
            { id: 24, category: 'Hardware Log', tools: 'IML, iDrac, ssacli, megacli, perccli', threshold: '에러 없음', result: '양호', detail: '' }
        ];

        const initialData = {
            reportNo: `PM-${new Date().getFullYear()}${String(new Date().getMonth() + 1).padStart(2, '0')}${String(new Date().getDate()).padStart(2, '0')}-001`,
            customerName: '',
            checkDate: new Date().toISOString().split('T')[0],
            contractor: '(주)가리온정보기술',
            engineer: '',
            department: '기술부',
            customerManager1: '',
            
            driveLink: '',
            engineerSignature: '', 
            customerSignature: '',
            
            staticSystems: [
                { id: 1, type: 'DL380G9', hostName: 'PACS01', ip: '10.0.0.4', os: 'Windows Server 2016', specs: 'Gold 5112 3.60GHz / 32GB', installDate: '20.05.10' }
            ],
            
            winHealthChecks: [...defaultWinHealthChecks],
            linuxHealthChecks: [...defaultLinuxHealthChecks],

            volumes: [
                { id: 1, group: 'main', serverName: 'PACS01', drive: 'C:\\', total: 139, prevFree: '88.0', free: 86.3, note: 'OS', hiddenInPrint: false, showDivider: false },
                { id: 2, group: 'main', serverName: 'PACS01', drive: 'D:\\', total: 9990, prevFree: '5500', free: 5330, note: 'Oracle', hiddenInPrint: false, showDivider: false }
            ],
            
            linuxVolumes: [
                { id: 1, group: 'backup', serverName: 'Backup01', drive: '/data', total: 15000, prevFree: '14500', free: 14000, note: '/dev/sdb1', hiddenInPrint: false, showDivider: false }
            ],
            
            extraWinTables: [],
            extraLinuxTables: [],

            storageTitles: {
                main: '메인 스토리지 통합 분석',
                backup: '백업 스토리지 통합 분석',
                other: '기타 스토리지 통합 분석 1',
                other2: '기타 스토리지 통합 분석 2',
                other3: '기타 스토리지 통합 분석 3'
            },

            pageBreaks: {},
            spacers: {},

            engineerMemo: '', 
            customHealthTitle: '기타 장비 점검 (네트워크/보안 등)', 
            customHealthChecks: [], 

            supportHistory: [],
            freeTextBlocks: [], 
            
            serviceHistory: '',
            notices: {
                agingEquip: '',
                recentIssues: '',
                infraImprovement: '',
                zabbixRequired: false,
                iloRequired: false,
                backupRequired: false
            },
            
            toggles: {
                winHealth: true,
                linuxHealth: false,
                customHealth: false,
                winStorage: true,
                linuxStorage: false
            },
            
            syncedAt: null 
        };

        function App() {
            const [data, setData] = useState(initialData);
            const [notification, setNotification] = useState('');
            const [savedProfiles, setSavedProfiles] = useState([]); 
            const [selectedCustomer, setSelectedCustomer] = useState(''); 
            const [selectedKey, setSelectedKey] = useState(''); 
            
            const [signModal, setSignModal] = useState({ isOpen: false, target: '', title: '' });
            const [isSyncing, setIsSyncing] = useState(false);

            const fileInputRef = useRef(null);

            useEffect(() => {
                const dateStr = data.checkDate ? data.checkDate.substring(0, 7) : '';
                const titleStr = data.customerName ? `${data.customerName}_${dateStr}` : `PM레포트_${dateStr}`;
                document.title = titleStr;
            }, [data.customerName, data.checkDate]);

            const showMessage = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 4000); 
            };

            const refreshProfiles = () => {
                const keys = Object.keys(localStorage)
                    .filter(key => key.startsWith('pm_profile_'))
                    .map(key => key.replace('pm_profile_', ''));
                
                const parsed = keys.map(fullKey => {
                    const parts = fullKey.split('_');
                    let month = parts.length > 1 ? parts.pop() : '';
                    let name = parts.join('_');
                    return { name, month, originalKey: fullKey };
                }).sort((a, b) => b.month.localeCompare(a.month));
                setSavedProfiles(parsed);
            };

            useEffect(() => { refreshProfiles(); }, []);

            const uniqueCustomers = [...new Set(savedProfiles.map(p => p.name))];
            const availableMonths = savedProfiles.filter(p => p.name === selectedCustomer);

            const handleChange = (e, section, field) => {
                const value = e.target.type === 'checkbox' ? e.target.checked : e.target.value;
                if (section) {
                    setData(prev => ({ ...prev, [section]: { ...(prev[section] || {}), [field]: value }, syncedAt: null }));
                } else {
                    setData(prev => ({ ...prev, [field]: value, syncedAt: null }));
                }
            };

            const handleArrayChange = (index, arrayName, field, value) => {
                const newArray = [...(data[arrayName] || [])];
                newArray[index][field] = value;
                setData(prev => ({ ...prev, [arrayName]: newArray, syncedAt: null }));
            };

            const addArrayItem = (arrayName, defaultObj) => {
                setData(prev => ({ ...prev, [arrayName]: [...(prev[arrayName] || []), { id: Date.now(), ...defaultObj }], syncedAt: null }));
            };

            const removeArrayItem = (index, arrayName) => {
                const newArray = [...(data[arrayName] || [])];
                newArray.splice(index, 1);
                setData(prev => ({ ...prev, [arrayName]: newArray, syncedAt: null }));
            };

            const insertArrayItem = (index, arrayName, defaultObj) => {
                const newArray = [...(data[arrayName] || [])];
                newArray.splice(index + 1, 0, { id: Date.now() + Math.floor(Math.random() * 1000), ...defaultObj });
                setData(prev => ({ ...prev, [arrayName]: newArray, syncedAt: null }));
            };

            const duplicateArrayItem = (index, arrayName) => {
                const newArray = [...(data[arrayName] || [])];
                const itemToCopy = { ...newArray[index], id: Date.now() + Math.floor(Math.random() * 1000) };
                newArray.splice(index + 1, 0, itemToCopy);
                setData(prev => ({ ...prev, [arrayName]: newArray, syncedAt: null }));
                showMessage('복사되었습니다.');
            };

            const handleToggle = (key) => {
                setData(prev => ({
                    ...prev,
                    toggles: { ...(prev.toggles || {}), [key]: !(prev.toggles || {})[key] },
                    syncedAt: null
                }));
            };

            const handleSaveSignature = (dataUrl) => {
                setData(prev => ({ ...prev, [signModal.target]: dataUrl, syncedAt: null }));
                setSignModal({ isOpen: false, target: '', title: '' });
            };

            const saveData = (silence = false) => {
                if (!data.customerName) { 
                    if (!silence) showMessage('고객사명을 먼저 입력해주세요.'); 
                    return false; 
                }
                const saveKey = `${data.customerName}_${data.checkDate.substring(0, 7)}`;
                localStorage.setItem(`pm_profile_${saveKey}`, JSON.stringify(data));
                if (!silence) showMessage('데이터가 안전하게 저장되었습니다.');
                refreshProfiles();
                return true;
            };

            const processLoadedData = (loadedData) => {
                if (!loadedData.checkDate) loadedData.checkDate = new Date().toISOString().split('T')[0];
                
                if (!loadedData.staticSystems) loadedData.staticSystems = [...initialData.staticSystems];

                if (loadedData.healthChecks && !loadedData.winHealthChecks) {
                    loadedData.winHealthChecks = loadedData.healthChecks.map(chk => ({
                        id: chk.id, category: chk.category, tools: chk.item, threshold: '', result: chk.result, detail: ''
                    }));
                }
                if (!loadedData.winHealthChecks) loadedData.winHealthChecks = [...defaultWinHealthChecks];
                if (!loadedData.linuxHealthChecks) loadedData.linuxHealthChecks = [...defaultLinuxHealthChecks];

                if (loadedData.volumes) {
                    loadedData.volumes = loadedData.volumes.map(v => ({ ...v, group: v.group || '', hiddenInPrint: !!v.hiddenInPrint, showDivider: !!v.showDivider }));
                } else {
                    loadedData.volumes = [];
                }

                if (loadedData.linuxVolumes) {
                    loadedData.linuxVolumes = loadedData.linuxVolumes.map(v => ({ ...v, group: v.group || '', hiddenInPrint: !!v.hiddenInPrint, showDivider: !!v.showDivider }));
                } else {
                    loadedData.linuxVolumes = [];
                }
                
                if (!loadedData.extraWinTables) loadedData.extraWinTables = [];
                else {
                    loadedData.extraWinTables = loadedData.extraWinTables.map(t => ({
                        ...t, volumes: (t.volumes || []).map(v => ({ ...v, hiddenInPrint: !!v.hiddenInPrint, showDivider: !!v.showDivider }))
                    }));
                }

                if (!loadedData.extraLinuxTables) loadedData.extraLinuxTables = [];
                else {
                    loadedData.extraLinuxTables = loadedData.extraLinuxTables.map(t => ({
                        ...t, volumes: (t.volumes || []).map(v => ({ ...v, hiddenInPrint: !!v.hiddenInPrint, showDivider: !!v.showDivider }))
                    }));
                }

                if (!loadedData.supportHistory) loadedData.supportHistory = [];
                if (!loadedData.freeTextBlocks) loadedData.freeTextBlocks = [];
                if (!loadedData.customHealthChecks) loadedData.customHealthChecks = [];

                if (loadedData.engineerSignature === undefined) loadedData.engineerSignature = '';
                if (loadedData.customerSignature === undefined) loadedData.customerSignature = '';

                if (!loadedData.storageTitles) {
                    loadedData.storageTitles = { main: '메인 스토리지 통합 분석', backup: '백업 스토리지 통합 분석', other: '기타 스토리지 통합 분석 1', other2: '기타 스토리지 통합 분석 2', other3: '기타 스토리지 통합 분석 3' };
                } else {
                    if (!loadedData.storageTitles.other) loadedData.storageTitles.other = '기타 스토리지 통합 분석 1';
                    if (!loadedData.storageTitles.other2) loadedData.storageTitles.other2 = '기타 스토리지 통합 분석 2';
                    if (!loadedData.storageTitles.other3) loadedData.storageTitles.other3 = '기타 스토리지 통합 분석 3';
                }

                if (!loadedData.pageBreaks) loadedData.pageBreaks = {};
                if (!loadedData.spacers) loadedData.spacers = {};

                if (loadedData.driveLink === undefined) loadedData.driveLink = ''; 
                if (loadedData.engineerMemo === undefined) loadedData.engineerMemo = '';
                if (loadedData.customHealthTitle === undefined) loadedData.customHealthTitle = '기타 장비 점검 (네트워크/보안 등)';
                
                if (!loadedData.toggles) {
                    loadedData.toggles = {
                        winHealth: true,
                        linuxHealth: false,
                        customHealth: (loadedData.customHealthChecks && loadedData.customHealthChecks.length > 0),
                        winStorage: true,
                        linuxStorage: false
                    };
                }

                if (loadedData.notices && loadedData.notices.backupRequired === undefined) {
                    loadedData.notices.backupRequired = false;
                }
                
                return loadedData;
            };

            const loadData = (fullKey) => {
                const saved = localStorage.getItem(`pm_profile_${fullKey}`);
                if (saved) {
                    let loadedData = JSON.parse(saved);
                    setData(processLoadedData(loadedData));
                    showMessage('이전 데이터를 성공적으로 불러왔습니다.');
                }
            };

            const deleteData = () => {
                if (!selectedKey) return;
                if (window.confirm('선택하신 점검월 데이터를 삭제하시겠습니까?')) {
                    localStorage.removeItem(`pm_profile_${selectedKey}`);
                    showMessage('삭제가 완료되었습니다.');
                    refreshProfiles();
                    setSelectedKey('');
                }
            };

            const exportJSON = () => {
                const dataStr = JSON.stringify(data, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const linkElement = document.createElement('a');
                
                const dateStr = data.checkDate ? data.checkDate.replace(/-/g, '').substring(2) : '';
                const fileName = `${data.customerName || 'PM_Report'}_PM레포트_${dateStr}.json`;
                
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', fileName);
                linkElement.click();
            };

            const importJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let importedData = JSON.parse(event.target.result);
                        setData(processLoadedData(importedData));
                        showMessage('백업 파일을 성공적으로 불러왔습니다.');
                    } catch (error) {
                        showMessage('잘못된 파일 형식입니다.');
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const rolloverStorage = () => {
                setData(prev => ({
                    ...prev,
                    volumes: (prev.volumes || []).map(v => ({ ...v, prevFree: v.free, free: '' })),
                    linuxVolumes: (prev.linuxVolumes || []).map(v => ({ ...v, prevFree: v.free, free: '' })),
                    extraWinTables: (prev.extraWinTables || []).map(t => ({
                        ...t,
                        volumes: (t.volumes || []).map(v => ({ ...v, prevFree: v.free, free: '' }))
                    })),
                    extraLinuxTables: (prev.extraLinuxTables || []).map(t => ({
                        ...t,
                        volumes: (t.volumes || []).map(v => ({ ...v, prevFree: v.free, free: '' }))
                    })),
                    syncedAt: null
                }));
                showMessage('✅ 기존 당월 용량이 전월 칸으로 이월되었습니다. 새 용량을 입력하세요!');
            };

            const addExtraTable = (type) => {
                const newTable = {
                    id: Date.now(),
                    title: type === 'win' ? '추가 Windows 스토리지' : '추가 Linux 스토리지',
                    volumes: [] 
                };
                if (type === 'win') {
                    setData(prev => ({ ...prev, extraWinTables: [...(prev.extraWinTables || []), newTable], syncedAt: null }));
                } else {
                    setData(prev => ({ ...prev, extraLinuxTables: [...(prev.extraLinuxTables || []), newTable], syncedAt: null }));
                }
            };

            const removeExtraTable = (type, tIdx) => {
                if (window.confirm('이 표를 정말 삭제하시겠습니까?')) {
                    if (type === 'win') {
                        const newTables = [...(data.extraWinTables || [])];
                        newTables.splice(tIdx, 1);
                        setData(prev => ({ ...prev, extraWinTables: newTables, syncedAt: null }));
                    } else {
                        const newTables = [...(data.extraLinuxTables || [])];
                        newTables.splice(tIdx, 1);
                        setData(prev => ({ ...prev, extraLinuxTables: newTables, syncedAt: null }));
                    }
                }
            };

            const handleExtraWinChange = (tIdx, vIdx, field, value) => {
                const newTables = [...(data.extraWinTables || [])];
                newTables[tIdx].volumes[vIdx][field] = value;
                setData(prev => ({ ...prev, extraWinTables: newTables, syncedAt: null }));
            };

            const addExtraWinVolume = (tIdx, idx, defaultObj) => {
                const newTables = [...(data.extraWinTables || [])];
                if (idx === -1) {
                    newTables[tIdx].volumes.push({ id: Date.now(), ...defaultObj });
                } else {
                    newTables[tIdx].volumes.splice(idx + 1, 0, { id: Date.now(), ...defaultObj });
                }
                setData(prev => ({ ...prev, extraWinTables: newTables, syncedAt: null }));
            };

            const removeExtraWinVolume = (tIdx, vIdx) => {
                const newTables = [...(data.extraWinTables || [])];
                newTables[tIdx].volumes.splice(vIdx, 1);
                setData(prev => ({ ...prev, extraWinTables: newTables, syncedAt: null }));
            };
            
            const duplicateExtraWinVolume = (tIdx, vIdx) => {
                const newTables = [...(data.extraWinTables || [])];
                const itemToCopy = { ...newTables[tIdx].volumes[vIdx], id: Date.now() + Math.floor(Math.random() * 1000) };
                newTables[tIdx].volumes.splice(vIdx + 1, 0, itemToCopy);
                setData(prev => ({ ...prev, extraWinTables: newTables, syncedAt: null }));
                showMessage('복사되었습니다.');
            };

            const handleExtraLinuxChange = (tIdx, vIdx, field, value) => {
                const newTables = [...(data.extraLinuxTables || [])];
                newTables[tIdx].volumes[vIdx][field] = value;
                setData(prev => ({ ...prev, extraLinuxTables: newTables, syncedAt: null }));
            };

            const addExtraLinuxVolume = (tIdx, idx, defaultObj) => {
                const newTables = [...(data.extraLinuxTables || [])];
                if (idx === -1) {
                    newTables[tIdx].volumes.push({ id: Date.now(), ...defaultObj });
                } else {
                    newTables[tIdx].volumes.splice(idx + 1, 0, { id: Date.now(), ...defaultObj });
                }
                setData(prev => ({ ...prev, extraLinuxTables: newTables, syncedAt: null }));
            };

            const removeExtraLinuxVolume = (tIdx, vIdx) => {
                const newTables = [...(data.extraLinuxTables || [])];
                newTables[tIdx].volumes.splice(vIdx, 1);
                setData(prev => ({ ...prev, extraLinuxTables: newTables, syncedAt: null }));
            };
            
            const duplicateExtraLinuxVolume = (tIdx, vIdx) => {
                const newTables = [...(data.extraLinuxTables || [])];
                const itemToCopy = { ...newTables[tIdx].volumes[vIdx], id: Date.now() + Math.floor(Math.random() * 1000) };
                newTables[tIdx].volumes.splice(vIdx + 1, 0, itemToCopy);
                setData(prev => ({ ...prev, extraLinuxTables: newTables, syncedAt: null }));
                showMessage('복사되었습니다.');
            };

            const getGroupColorClass = (g) => {
                if (g === 'main') return 'text-blue-600';
                if (g === 'backup') return 'text-emerald-600';
                if (g === 'other') return 'text-purple-600';
                if (g === 'other2') return 'text-orange-600';
                if (g === 'other3') return 'text-teal-600';
                return 'text-gray-400';
            };

            const analyzeStorage = (groupType) => {
                let allVolumes = [
                    ...(data.toggles.winStorage && data.volumes ? data.volumes : []),
                    ...(data.toggles.linuxStorage && data.linuxVolumes ? data.linuxVolumes : [])
                ];
                
                if (data.extraWinTables) {
                    data.extraWinTables.forEach(t => {
                        if (t.volumes) allVolumes = [...allVolumes, ...t.volumes];
                    });
                }
                if (data.extraLinuxTables) {
                    data.extraLinuxTables.forEach(t => {
                        if (t.volumes) allVolumes = [...allVolumes, ...t.volumes];
                    });
                }
                
                const selected = allVolumes.filter(v => v.group === groupType);
                if (selected.length === 0) return null;

                let sumTotal = 0;
                let sumFree = 0;
                let diffSum = 0; 
                let diffValidCount = 0;

                selected.forEach(v => {
                    const t = parseFloat(v.total) || 0;
                    const f = parseFloat(v.free) || 0;
                    sumTotal += t;
                    sumFree += f;

                    const pf = parseFloat(v.prevFree);
                    if (!isNaN(pf) && pf > 0) {
                        diffSum += (pf - f); 
                        diffValidCount++;
                    }
                });

                const sumUsed = sumTotal - sumFree;
                const usedPercent = sumTotal > 0 ? ((sumUsed / sumTotal) * 100).toFixed(1) : 0;
                
                let monthsLeft = null;
                let targetDateStr = '';
                
                if (diffValidCount > 0 && diffSum > 0) {
                    monthsLeft = sumFree / diffSum;
                    let targetDate = new Date(data.checkDate);
                    targetDate.setMonth(targetDate.getMonth() + Math.floor(monthsLeft));
                    targetDateStr = `${targetDate.getFullYear()}년 ${targetDate.getMonth() + 1}월`;
                }

                return {
                    count: selected.length,
                    total: sumTotal.toFixed(1),
                    used: sumUsed.toFixed(1),
                    free: sumFree.toFixed(1),
                    percent: usedPercent,
                    monthlyUsage: diffValidCount > 0 ? diffSum.toFixed(1) : null,
                    monthsLeft: monthsLeft !== null ? Math.floor(monthsLeft) : null,
                    targetDateStr: targetDateStr
                };
            };

            const sendToHQ = async () => {
                if(!GOOGLE_SCRIPT_URL) {
                    alert("코드 내부에 구글 Apps Script 웹 앱 URL이 입력되지 않았습니다.");
                    return;
                }
                
                if(!data.customerName) {
                    showMessage("고객사명을 먼저 입력해주세요.");
                    return;
                }

                saveData(true); 
                setIsSyncing(true);

                const historyStr = (data.supportHistory || []).length > 0 
                    ? data.supportHistory.map(h => `[${h.date}] ${h.content}`).join(' / ') 
                    : '이력 없음';

                let allVolumes = [
                    ...(data.toggles.winStorage && data.volumes ? data.volumes : []),
                    ...(data.toggles.linuxStorage && data.linuxVolumes ? data.linuxVolumes : [])
                ];
                if (data.extraWinTables) {
                    data.extraWinTables.forEach(t => { if (t.volumes) allVolumes.push(...t.volumes); });
                }
                if (data.extraLinuxTables) {
                    data.extraLinuxTables.forEach(t => { if (t.volumes) allVolumes.push(...t.volumes); });
                }

                const mappedVolumes = allVolumes.map(v => {
                    const t = parseFloat(v.total) || 0;
                    const f = parseFloat(v.free) || 0;
                    const used = t > 0 ? t - f : 0;
                    const p = t > 0 ? ((used / t) * 100).toFixed(1) + '%' : '0%';
                    
                    let groupName = v.group;
                    if(groupName === 'main') groupName = 'Main';
                    else if(groupName === 'backup') groupName = 'Backup';
                    else if(groupName === '') groupName = '제외';
                    else groupName = '기타';

                    return {
                        group: groupName,
                        serverName: v.serverName || '-',
                        drive: v.drive || '-',
                        total: t,
                        free: f,
                        percent: p
                    };
                });

                const payload = {
                    checkDate: data.checkDate,
                    customerName: data.customerName,
                    engineer: data.engineer,
                    supportHistory: historyStr,
                    serviceHistory: data.serviceHistory,
                    volumes: mappedVolumes,
                    rawJson: JSON.stringify(data) // 드라이브에 저장될 전체 JSON 데이터 추가
                };

                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const now = new Date().toLocaleString();
                        setData(prev => {
                            const newData = { ...prev, syncedAt: now };
                            const saveKey = `${newData.customerName}_${newData.checkDate.substring(0, 7)}`;
                            localStorage.setItem(`pm_profile_${saveKey}`, JSON.stringify(newData));
                            return newData;
                        });
                        showMessage("본사 엑셀 및 드라이브로 전송이 완료되었습니다!");
                    } else {
                        throw new Error('Network response was not ok');
                    }
                } catch (error) {
                    console.error("Sync Error:", error);
                    alert("전송에 실패했습니다. 인터넷 연결을 확인하거나 나중에 다시 시도해주세요.");
                } finally {
                    setIsSyncing(false);
                }
            };

            const renderAnalysisCard = (groupType) => {
                const analysis = analyzeStorage(groupType);
                if (!analysis) return null; 

                const theme = {
                    main: { text: 'text-blue-700', stroke: '#3b82f6', bgSubtle: 'bg-blue-50/30', borderSubtle: 'border-blue-100', bgMuted: 'bg-blue-50/50', borderMuted: 'border-blue-50', textLight: 'text-blue-400' },
                    backup: { text: 'text-emerald-700', stroke: '#10b981', bgSubtle: 'bg-emerald-50/30', borderSubtle: 'border-emerald-100', bgMuted: 'bg-emerald-50/50', borderMuted: 'border-emerald-50', textLight: 'text-emerald-400' },
                    other: { text: 'text-purple-700', stroke: '#a855f7', bgSubtle: 'bg-purple-50/30', borderSubtle: 'border-purple-100', bgMuted: 'bg-purple-50/50', borderMuted: 'border-purple-50', textLight: 'text-purple-400' },
                    other2: { text: 'text-orange-700', stroke: '#f97316', bgSubtle: 'bg-orange-50/30', borderSubtle: 'border-orange-100', bgMuted: 'bg-orange-50/50', borderMuted: 'border-orange-50', textLight: 'text-orange-400' },
                    other3: { text: 'text-teal-700', stroke: '#14b8a6', bgSubtle: 'bg-teal-50/30', borderSubtle: 'border-teal-100', bgMuted: 'bg-teal-50/50', borderMuted: 'border-teal-50', textLight: 'text-teal-400' }
                }[groupType] || theme.main; 

                const isWarning = analysis.percent >= 90;
                const currentStroke = isWarning ? "#ef4444" : theme.stroke;
                const warningText = 'text-red-600';

                return (
                    <div className={`border rounded-2xl bg-white shadow-sm flex overflow-hidden mb-6 ${theme.borderSubtle}`}>
                        <div className={`w-1/3 p-6 flex flex-col items-center justify-center border-r ${theme.bgSubtle} ${theme.borderSubtle}`}>
                            <div className="relative w-36 h-36">
                                <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90">
                                    <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#e2e8f0" strokeWidth="4"></circle>
                                    <circle 
                                        cx="18" cy="18" r="15.915" fill="transparent" 
                                        stroke={currentStroke} 
                                        strokeWidth="4" 
                                        strokeDasharray={`${Math.min(analysis.percent, 100)} ${Math.max(100 - analysis.percent, 0)}`} 
                                        strokeDashoffset="0"
                                        strokeLinecap="round"
                                        className="donut-circle"
                                    ></circle>
                                </svg>
                                <div className="absolute inset-0 flex flex-col items-center justify-center">
                                    <span className={`text-3xl font-black leading-none ${isWarning ? warningText : theme.text}`}>{analysis.percent}%</span>
                                    <span className="text-[10px] text-gray-500 font-bold uppercase tracking-wider mt-1">Used</span>
                                </div>
                            </div>
                            <div className="mt-4 text-xs text-gray-500 font-medium">선택된 볼륨: <span className="font-bold text-gray-700">{analysis.count}개</span></div>
                        </div>
                        
                        <div className="w-2/3 p-6 flex flex-col justify-center">
                            <div className="grid grid-cols-3 gap-4 mb-5 border-b border-gray-100 pb-5">
                                <div>
                                    <div className="text-xs text-gray-400 font-bold mb-1">총 용량 (Total)</div>
                                    <div className="text-xl font-extrabold text-gray-800">{analysis.total} <span className="text-xs font-normal text-gray-500">GB</span></div>
                                </div>
                                <div>
                                    <div className="text-xs text-gray-400 font-bold mb-1">사용 중 (Used)</div>
                                    <div className={`text-xl font-extrabold ${theme.text}`}>{analysis.used} <span className={`text-xs font-normal ${theme.textLight}`}>GB</span></div>
                                </div>
                                <div>
                                    <div className="text-xs text-gray-400 font-bold mb-1">남은 용량 (Free)</div>
                                    <div className="text-xl font-extrabold text-gray-600">{analysis.free} <span className="text-xs font-normal opacity-70">GB</span></div>
                                </div>
                            </div>
                            
                            <div className={`p-4 rounded-xl border ${theme.bgMuted} ${theme.borderMuted}`}>
                                <div className="flex items-start mb-2">
                                    <span className="mr-2 mt-0.5">📊</span>
                                    <span className="text-sm text-gray-700 font-semibold leading-relaxed">
                                        최근 한 달간 사용량은 <span className="text-red-600 font-bold">약 {analysis.monthlyUsage ? analysis.monthlyUsage : '0'} GB</span> 입니다.
                                    </span>
                                </div>
                                <div className="flex items-start">
                                    <span className="mr-2 mt-0.5">{(!analysis.monthlyUsage || parseFloat(analysis.monthlyUsage) <= 0) ? '✅' : '🚨'}</span>
                                    <span className="text-sm text-gray-700 font-semibold leading-relaxed">
                                        {analysis.monthlyUsage && parseFloat(analysis.monthlyUsage) > 0 ? (
                                            <>
                                                현재 추세가 유지된다면 <span className="text-red-600 font-extrabold text-base bg-red-50 px-1 rounded">약 {analysis.monthsLeft}개월 후 ({analysis.targetDateStr})</span> 스토리지 포화가 예상됩니다.
                                            </>
                                        ) : (
                                            <span className={`${theme.text} font-bold`}>현재 용량 사용 추세가 안정적이거나 감소하고 있어 여유가 충분합니다.</span>
                                        )}
                                    </span>
                                </div>
                            </div>
                            
                            <div className="mt-3 text-[11px] text-gray-400 leading-tight">
                                * 안내된 스토리지 포화 예상 기간은 OS 탐색기 상의 월별 가용 용량(Free) 증감을 바탕으로 계산된 추정치입니다.<br/>
                                &nbsp;&nbsp;단순 참고용으로 용량 증설 계획 수립 시 참고 지표로만 활용하시길 권장합니다.
                            </div>
                        </div>
                    </div>
                );
            };

            const activeGroups = ['main', 'backup', 'other', 'other2', 'other3'].filter(g => analyzeStorage(g) !== null);

            const handleLayoutControl = (key, type, value) => {
                setData(prev => {
                    const newData = { ...prev, syncedAt: null };
                    if (type === 'break') {
                        newData.pageBreaks = { ...prev.pageBreaks, [key]: value };
                    } else if (type === 'spacer') {
                        newData.spacers = { ...prev.spacers, [key]: value };
                    }
                    return newData;
                });
            };

            const LayoutControl = ({ sectionKey }) => {
                const isBreak = data.pageBreaks[sectionKey] || false;
                const spacerHeight = data.spacers[sectionKey] || 0;

                return (
                    <React.Fragment>
                        <div className="relative w-full my-4 flex flex-col items-center justify-center group no-print">
                            <div className={`absolute top-1/2 w-full border-t-2 border-dashed -translate-y-1/2 transition-opacity duration-300 ${isBreak ? 'border-red-400 opacity-100' : 'border-gray-300 opacity-0 group-hover:opacity-100'}`}></div>

                            <div className={`relative z-10 flex gap-3 p-2 rounded-xl transition-all ${isBreak || spacerHeight > 0 ? 'opacity-100' : 'opacity-0 group-hover:opacity-100 bg-white/90 backdrop-blur border border-gray-200 shadow-sm'}`}>
                                <button
                                    onClick={() => handleLayoutControl(sectionKey, 'break', !isBreak)}
                                    className={`text-xs font-bold px-4 py-2 rounded-lg transition-all border shadow-sm ${isBreak ? 'bg-red-50 text-red-600 border-red-300 hover:bg-red-100' : 'bg-white text-gray-500 border-gray-200 hover:text-gray-700 hover:bg-gray-50'}`}
                                >
                                    {isBreak ? '✂️ 인쇄 페이지 나눔 취소' : '✂️ 강제 페이지 나눔 추가'}
                                </button>

                                <div className={`flex items-center gap-3 px-4 py-2 rounded-lg border transition-all shadow-sm ${spacerHeight > 0 ? 'bg-blue-50 border-blue-200' : 'bg-white border-gray-200'}`}>
                                    <span className={`text-xs font-bold whitespace-nowrap ${spacerHeight > 0 ? 'text-blue-700' : 'text-gray-500'}`}>
                                        ↕️ 인쇄 여백 늘리기 ({spacerHeight}px)
                                    </span>
                                    <input
                                        type="range"
                                        min="0"
                                        max="600"
                                        step="20"
                                        value={spacerHeight}
                                        onChange={(e) => handleLayoutControl(sectionKey, 'spacer', Number(e.target.value))}
                                        className="w-32 cursor-pointer"
                                    />
                                </div>
                            </div>
                        </div>

                        {spacerHeight > 0 && (
                            <React.Fragment>
                                <div style={{ height: `${spacerHeight}px` }} className="w-full border-x-2 border-y border-dashed border-blue-200 bg-blue-50/30 transition-all duration-200 flex items-center justify-center no-print my-2 rounded-lg overflow-hidden">
                                    <span className="text-blue-400/70 text-xs font-bold select-none">이 영역만큼 인쇄 시 표가 아래로 밀려납니다 ({spacerHeight}px)</span>
                                </div>
                                <div style={{ height: `${spacerHeight}px` }} className="w-full hidden print:block"></div>
                            </React.Fragment>
                        )}

                        {isBreak && <div className="page-break"></div>}
                    </React.Fragment>
                );
            };

            return (
                <div className="container mx-auto p-4 max-w-[210mm] relative">
                    <SignaturePad 
                        isOpen={signModal.isOpen} 
                        onClose={() => setSignModal({ isOpen: false, target: '', title: '' })} 
                        onSave={handleSaveSignature} 
                        targetTitle={signModal.title} 
                    />

                    {notification && (
                        <div className="fixed top-5 left-1/2 transform -translate-x-1/2 bg-[#1e3a8a] text-white px-6 py-3 rounded-lg shadow-xl z-50 font-bold no-print">
                            {notification}
                        </div>
                    )}

                    {/* 상단 컨트롤 패널 */}
                    <div className="no-print bg-white p-4 rounded-xl shadow-sm mb-6 flex flex-col gap-3 border border-blue-100">
                        <div className="flex flex-wrap gap-4 items-center justify-between w-full">
                            <div className="flex items-center gap-3">
                                <span className="text-blue-700 font-extrabold text-xl">스마트 PM 레포트 시스템</span>
                                <div className="flex items-center gap-2 bg-gray-50 p-1.5 rounded-lg border border-gray-200">
                                    <select className="bg-transparent text-sm outline-none w-32" value={selectedCustomer} onChange={(e) => { setSelectedCustomer(e.target.value); setSelectedKey(''); }}>
                                        <option value="">고객사 선택</option>
                                        {uniqueCustomers.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <select className="bg-transparent text-sm outline-none w-32" value={selectedKey} onChange={(e) => { setSelectedKey(e.target.value); if(e.target.value) loadData(e.target.value); }} disabled={!selectedCustomer}>
                                        <option value="">점검월 선택</option>
                                        {availableMonths.map(p => ( <option key={p.originalKey} value={p.originalKey}>{p.month}</option> ))}
                                    </select>
                                    <button onClick={deleteData} disabled={!selectedKey} className={`px-2 py-1 rounded text-xs font-bold transition ${selectedKey ? 'bg-red-50 text-red-600 hover:bg-red-100 border border-red-200' : 'bg-gray-100 text-gray-400 border border-gray-200 cursor-not-allowed'}`}>삭제</button>
                                </div>
                            </div>
                            <div className="flex gap-2 items-center">
                                <button onClick={()=>saveData(false)} className="bg-gray-800 text-white px-5 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-black">로컬 저장</button>
                                
                                {/* 본사 전송 버튼 */}
                                <button 
                                    onClick={sendToHQ} 
                                    disabled={isSyncing}
                                    className={`px-5 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center gap-1 ${
                                        isSyncing ? 'bg-blue-300 text-white cursor-wait' : 
                                        data.syncedAt ? 'bg-emerald-600 text-white hover:bg-emerald-700' : 'bg-blue-600 text-white hover:bg-blue-700'
                                    }`}
                                >
                                    {isSyncing ? '전송 중...' : data.syncedAt ? '☁️ 전송 완료 ✓' : '☁️ 본사 전송'}
                                </button>
                                
                                <div className="h-6 border-l border-gray-300 mx-1 my-auto"></div>

                                <button onClick={exportJSON} className="bg-white text-gray-600 px-4 py-2 rounded-lg text-sm font-bold border border-gray-200 hover:bg-gray-50">백업 받기</button>
                                <button onClick={() => fileInputRef.current.click()} className="bg-white text-gray-600 px-4 py-2 rounded-lg text-sm font-bold border border-gray-200 hover:bg-gray-50">열기</button>
                                <input type="file" accept=".json" ref={fileInputRef} onChange={importJSON} className="hidden" />
                                <button onClick={() => window.print()} className="bg-gray-100 text-gray-800 px-5 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-gray-200 border border-gray-300 ml-1">PDF / 인쇄</button>
                            </div>
                        </div>
                        {/* 동기화 시간 표시 */}
                        {data.syncedAt && (
                            <div className="w-full text-right text-xs text-emerald-600 font-bold">
                                마지막 본사 전송: {data.syncedAt}
                            </div>
                        )}
                    </div>

                    <div className="no-print bg-yellow-50 border border-yellow-200 p-5 rounded-2xl shadow-sm mb-8 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-2 h-full bg-yellow-400"></div>
                        <div className="flex justify-between items-center mb-2 pl-2">
                            <h3 className="font-bold text-yellow-800 flex items-center gap-2">
                                <span>📝</span> 엔지니어 전용 인수인계 메모 (PDF 출력 제외)
                            </h3>
                        </div>
                        <textarea 
                            className="w-full bg-transparent text-sm text-yellow-900 placeholder-yellow-600/50 outline-none resize-y min-h-[80px] p-2"
                            placeholder="다음 달 점검을 위한 특이사항, 주의점, 담당자 휴가 일정 등을 자유롭게 메모하세요..."
                            value={data.engineerMemo}
                            onChange={(e) => handleChange(e, null, 'engineerMemo')}
                        />
                    </div>

                    <div className="bg-white p-10 pb-16 rounded-2xl shadow-sm border border-gray-100 flex flex-col mb-8 print:shadow-none print:border-none print:m-0 print:p-8 print:pb-4 a4-min-height cover-page">
                        
                        <div className="text-sm text-gray-500 mb-8 border-b-2 border-black pb-2 flex justify-between items-end font-bold w-full print:mb-4">
                            <div className="mb-1">PM Report NO. <input type="text" value={data.reportNo} onChange={(e) => handleChange(e, null, 'reportNo')} className="w-48 ml-1 bg-transparent border-none outline-none" /></div>
                            
                            <div className="flex flex-col items-end gap-1.5">
                                <div className="no-print flex items-center gap-1.5">
                                    <span className="text-[10px] font-bold text-blue-600 bg-blue-50 border border-blue-100 px-1.5 py-0.5 rounded">드라이브 링크</span>
                                    <input 
                                        type="text" 
                                        value={data.driveLink || ''} 
                                        onChange={(e) => handleChange(e, null, 'driveLink')} 
                                        placeholder="공유 링크를 붙여넣으세요" 
                                        className="text-[11px] border border-gray-200 rounded px-2 py-1 w-48 outline-none focus:border-blue-400 font-normal text-gray-700 bg-gray-50/50"
                                    />
                                </div>
                                {data.driveLink && (
                                    <div className="flex items-center gap-2">
                                        <a href={data.driveLink} target="_blank" rel="noreferrer" className="text-blue-600 font-extrabold text-xs hover:underline flex items-center gap-1" title="클릭하여 폴더 열기">
                                            📁 고객사 폴더 열기
                                        </a>
                                        <div className="bg-white p-0.5 border border-gray-200 rounded shadow-sm">
                                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${encodeURIComponent(data.driveLink)}`} alt="QR Code" className="w-10 h-10 object-contain print:w-12 print:h-12" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        <div className="flex-grow flex flex-col items-center justify-center">
                            <img src="가리온.jpg" alt="가리온정보기술" className="h-32 object-contain mb-12 print:h-20 print:mb-6 w-auto" onError={(e) => { e.target.style.display = 'none'; }} />
                            <h2 className="text-7xl font-extrabold text-[#1e3a8a] tracking-tighter mb-16 print:text-5xl print:mb-8">PM Report</h2>
                            <div className="text-4xl font-bold flex items-center justify-center w-full print:text-3xl">
                                <span className="text-gray-300 font-light mx-4">(</span>
                                <div className="relative flex items-center justify-center">
                                    <span className="invisible whitespace-pre min-w-[250px] px-4 print:min-w-[200px]">{data.customerName || '고객사명'}</span>
                                    <input type="text" placeholder="고객사명" value={data.customerName} onChange={(e) => handleChange(e, null, 'customerName')} className="absolute inset-0 w-full bg-transparent text-center text-gray-800 placeholder-gray-300 outline-none" />
                                </div>
                                <span className="text-gray-300 font-light mx-4">)</span>
                            </div>
                        </div>

                        <div className="mt-auto w-full">
                            <div className="print-row-force flex justify-end mb-12 print:mb-4 pr-2">
                                <div className="flex items-center text-xl font-bold text-gray-800 print:text-lg">
                                    <span className="mr-4 whitespace-nowrap">점검일자</span>
                                    <input type="date" value={data.checkDate} onChange={(e) => handleChange(e, null, 'checkDate')} className="border border-gray-200 p-2 rounded-lg bg-transparent text-center font-bold print:border-none print:p-0 min-w-[150px]" />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-16 print:gap-8 px-2">
                                <div className="flex flex-col gap-2 print:gap-1">
                                    <div className="flex items-center border-b border-gray-300 h-14 print:h-10">
                                        <span className="w-20 shrink-0 text-gray-500 font-bold text-lg print:text-base">계약사</span>
                                        <input type="text" value={data.contractor} onChange={(e)=>handleChange(e, null, 'contractor')} className="flex-1 min-w-0 text-gray-800 text-lg font-bold bg-transparent ml-2 print:text-base outline-none" />
                                    </div>
                                    <div className="flex items-center border-b border-gray-300 h-14 print:h-10">
                                        <span className="w-20 shrink-0 text-gray-500 font-bold text-lg print:text-base">담당자</span>
                                        <input type="text" value={data.engineer} onChange={(e)=>handleChange(e, null, 'engineer')} placeholder="엔지니어명" className="flex-1 min-w-0 text-gray-800 font-bold text-lg bg-transparent ml-2 print:text-base outline-none" />
                                        
                                        <div 
                                            className="flex items-center justify-center cursor-pointer shrink-0 ml-2 h-full min-w-[80px]"
                                            onClick={() => setSignModal({ isOpen: true, target: 'engineerSignature', title: '엔지니어' })}
                                            title="클릭하여 서명하기"
                                        >
                                            {data.engineerSignature ? (
                                                <img src={data.engineerSignature} alt="서명" className="h-10 print:h-8 object-contain mix-blend-multiply" />
                                            ) : (
                                                <span className="text-red-500 text-[13px] font-bold whitespace-nowrap no-print hover:bg-red-50 px-2 py-1 rounded border border-dashed border-red-200 transition">(클릭하여 서명)</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-2 print:gap-1">
                                    <div className="flex items-center border-b border-gray-300 h-14 print:h-10">
                                        <span className="w-20 shrink-0 text-gray-500 font-bold text-lg print:text-base">고객사</span>
                                        <span className="flex-1 min-w-0 text-gray-800 font-extrabold text-lg ml-2 truncate print:text-base">{data.customerName || "-"}</span>
                                    </div>
                                    <div className="flex items-center border-b border-gray-300 h-14 print:h-10">
                                        <span className="w-20 shrink-0 text-gray-500 font-bold text-lg print:text-base">담당자</span>
                                        <input type="text" value={data.customerManager1} onChange={(e)=>handleChange(e, null, 'customerManager1')} placeholder="고객담당자" className="flex-1 min-w-0 text-gray-800 font-bold text-lg bg-transparent ml-2 print:text-base outline-none" />
                                        <span className="text-red-500 text-sm font-bold whitespace-nowrap shrink-0">(서명)</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white p-10 rounded-2xl shadow-sm border border-gray-100 page-break print:shadow-none print:border-none a4-min-height">
                        
                        <h3 className="section-title">1. 시스템 구성 및 정보</h3>
                        <div className="mb-10">
                            <table className="w-full text-sm text-center custom-table table-fixed">
                                <thead>
                                    <tr>
                                        <th className="w-[14%]">모델명</th><th className="w-[14%]">호스트명</th><th className="w-[14%]">IP 주소</th>
                                        <th className="w-[12%]">OS</th><th className="w-[28%]">H/W 사양</th><th className="w-[12%]">도입일</th><th className="no-print w-[6%]"></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(data.staticSystems || []).map((sys, idx) => (
                                        <tr key={sys.id}>
                                            <td><PrintableTextarea value={sys.type} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'type', e.target.value)} className="text-center font-bold" /></td>
                                            <td><PrintableTextarea value={sys.hostName} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'hostName', e.target.value)} className="text-center font-bold text-blue-700" /></td>
                                            <td><PrintableTextarea value={sys.ip} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'ip', e.target.value)} className="text-center" /></td>
                                            <td><PrintableTextarea value={sys.os} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'os', e.target.value)} className="text-center text-xs" /></td>
                                            <td><PrintableTextarea value={sys.specs} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'specs', e.target.value)} className="text-center text-xs" /></td>
                                            <td><PrintableTextarea value={sys.installDate} onChange={(e)=>handleArrayChange(idx, 'staticSystems', 'installDate', e.target.value)} className="text-center text-xs" placeholder="예: 20.05.10" /></td>
                                            <td className="no-print align-middle relative hover:z-[100]">
                                                <div className="flex justify-center items-center group/menu inline-block">
                                                    <button className="text-gray-400 hover:text-blue-600 transition-colors p-1 text-sm" title="메뉴">
                                                        ⚙️
                                                    </button>
                                                    <div className="absolute right-full mr-1 top-1/2 -translate-y-1/2 opacity-0 invisible group-hover/menu:opacity-100 group-hover/menu:visible transition-all duration-200 flex bg-white border border-gray-200 shadow-[0_4px_20px_-4px_rgba(0,0,0,0.1)] rounded-lg p-1.5 gap-1 z-[999] whitespace-nowrap">
                                                        <button onClick={()=>insertArrayItem(idx, 'staticSystems', {type:'', hostName:'', ip:'', os:'', specs:'', installDate:''})} className="text-xs hover:bg-blue-50 hover:text-blue-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">➕ 추가</button>
                                                        <button onClick={()=>duplicateArrayItem(idx, 'staticSystems')} className="text-xs hover:bg-emerald-50 hover:text-emerald-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">📑 복사</button>
                                                        <div className="w-px bg-gray-200 mx-0.5 my-1"></div>
                                                        <button onClick={()=>removeArrayItem(idx, 'staticSystems')} className="text-xs hover:bg-red-50 hover:text-red-600 px-2 py-1.5 rounded transition-colors flex items-center font-bold text-gray-600">❌ 삭제</button>
                                                    </div>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            <button onClick={()=>addArrayItem('staticSystems', {type:'', hostName:'', ip:'', os:'', specs:'', installDate:''})} className="no-print mt-3 text-xs font-bold text-blue-600 px-3 py-1 bg-blue-50 rounded hover:bg-blue-100">+ 장비 추가</button>
                        </div>

                        <LayoutControl sectionKey="sec1" />

                        <div className="mt-10 mb-4 flex justify-between items-end">
                            <h3 className="section-title mb-0">2. 시스템 상태 점검</h3>
                            <div className="flex gap-2 no-print">
                                <button 
                                    onClick={() => handleToggle('winHealth')} 
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition border ${data.toggles.winHealth ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    {data.toggles.winHealth ? '☑ Windows 점검표' : '☐ Windows 점검표'}
                                </button>
                                <button 
                                    onClick={() => handleToggle('linuxHealth')} 
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition border ${data.toggles.linuxHealth ? 'bg-emerald-600 text-white border-emerald-600 shadow-sm' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    {data.toggles.linuxHealth ? '☑ Linux 점검표' : '☐ Linux 점검표'}
                                </button>
                                <button 
                                    onClick={() => handleToggle('customHealth')} 
                                    className={`px-3 py-1.5 rounded-lg text-xs font-bold transition border ${data.toggles.customHealth ? 'bg-amber-500 text-white border-amber-500 shadow-sm' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}
                                >
                                    {data.toggles.customHealth ? '☑ 기타/커스텀' : '☐ 기타/커스텀'}
                                </button>
                            </div>
                        </div>

                        {data.toggles.winHealth && (
                            <div className="mb-10">
                                <div className="text-sm font-bold text-blue-800 mb-2 pl-1 border-l-4 border-blue-300">Windows 점검 항목</div>
                                <table className="w-full text-sm text-center custom-table table-fixed">
                                    <thead>
                                        <tr>
                                            <th className="w-[18%]">점검 항목</th>
                                            <th className="w-[35%]">점검 도구 및 명령어</th>
                                            <th className="w-[22%]">판단 기준 (임계치)</th>
                                            <th className="w-[19%]">점검 결과 및 상세</th>
                                            <th className="no-print w-[6%]"></th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {(data.winHealthChecks || []).map((chk, idx) => (
                                            <tr key={chk.id}>
                                                <td><PrintableTextarea value={chk.category} onChange={(e)=>handleArrayChange(idx, 'winHealthChecks', 'category', e.target.value)} className="text-center font-bold text-gray-800" /></td>
                                                <td><PrintableTextarea value={chk.tools} onChange={(e)=>handleArrayChange(idx, 'winHealthChecks', 'tools', e.target.value)} className="text-center text-gray-600 text-xs" /></td>
                                                <td><PrintableTextarea value={chk.threshold} onChange={(e)=>handleArrayChange(idx, 'winHealthChecks', 'threshold', e.target.value)} className="text-center text-gray-500 text-xs" /></td>
                                                <td className="align-middle px-2">
                                                    <div className="flex flex-col items-center justify-center gap-1.5 w-full">
                                                        <select 
                                                            value={chk.result} 
                                                            onChange={(e)=>handleArrayChange(idx, 'winHealthChecks', 'result', e.target.value)} 
                                                            className={`w-full text-center font-bold bg-transparent appearance-none cursor-pointer outline-none ${chk.result === '양호' ? 'text-emerald-600' : (chk.result === '주의' ? 'text-orange-500' : 'text-red-600')}`}
                                                        >
                                                            <option value="양호">양호</option>
                                                            <option value="주의">주의</option>
                                                            <option value="불량">불량</option>
                                                        </select>
                                                        <PrintableTextarea 
                                                            value={chk.detail || ''} 
                                                            onChange={(e)=>handleArrayChange(idx, 'winHealthChecks', 'detail', e.target.value)} 
                                                            placeholder="예: 35%" 
                                                            className="text-center text-xs text-gray-600 bg-gray-50/50 border border-gray-100 rounded" 
                                                        />
                                                    </div>
                                                </td>
                                                <td className="no-print align-middle relative hover:z-[100]">
